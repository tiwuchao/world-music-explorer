<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Music Explorer — Tina Chao</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d12;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --accent: #e8b86d;
      --accent2: #c97b63;
      --text: #f0ede6;
      --muted: #8a8899;
      --border: rgba(255,255,255,0.07);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 2.5rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      text-align: center;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    header .byline {
      font-size: 0.78rem;
      color: var(--accent);
      opacity: 0.7;
      margin-top: 0.2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .instruction {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }

    .regions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .region-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1.2rem;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      position: relative;
      overflow: hidden;
    }

    .region-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: 14px;
    }

    .region-btn:hover::before, .region-btn.active::before { opacity: 1; }

    .region-btn[data-region="west-africa"]::before { background: linear-gradient(135deg, rgba(232,184,109,0.12), rgba(201,123,99,0.08)); }
    .region-btn[data-region="east-asia"]::before    { background: linear-gradient(135deg, rgba(109,180,232,0.12), rgba(99,150,201,0.08)); }
    .region-btn[data-region="latin-america"]::before{ background: linear-gradient(135deg, rgba(109,232,150,0.12), rgba(99,201,170,0.08)); }
    .region-btn[data-region="middle-east"]::before  { background: linear-gradient(135deg, rgba(200,109,232,0.12), rgba(170,99,201,0.08)); }
    .region-btn[data-region="south-asia"]::before   { background: linear-gradient(135deg, rgba(232,109,109,0.12), rgba(201,99,120,0.08)); }
    .region-btn[data-region="europe"]::before       { background: linear-gradient(135deg, rgba(109,210,232,0.12), rgba(99,180,201,0.08)); }

    .region-btn:hover, .region-btn.active {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .region-btn.active { border-color: var(--accent); }

    .region-emoji { font-size: 2rem; line-height: 1; }
    .region-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .region-sub {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 300;
    }

    .info-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      display: none;
      animation: fadeSlide 0.35s ease;
    }

    .info-panel.visible { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .panel-emoji { font-size: 3rem; }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .panel-subtitle { color: var(--muted); font-size: 0.85rem; font-weight: 300; margin-top: 0.2rem; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .info-card {
      background: var(--surface2);
      border-radius: 12px;
      padding: 1.2rem;
    }

    .info-card-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.6rem;
      font-weight: 500;
    }

    .info-card-value {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      background: rgba(232,184,109,0.12);
      border: 1px solid rgba(232,184,109,0.25);
      color: var(--accent);
      font-size: 0.78rem;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-weight: 500;
    }

    .fun-fact {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 12px 12px 0;
      padding: 1.2rem 1.4rem;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text);
      font-style: italic;
    }

    .fun-fact strong {
      font-style: normal;
      color: var(--accent);
      font-weight: 500;
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

<header>
  <h1>World Music Explorer</h1>
  <p>Discover instruments, genres, and musical traditions across cultures</p>
  <div class="byline">By Tina Chao · tiwuchao · SI 579</div>
</header>

<main>
  <p class="instruction">Click a region to explore its musical traditions ↓</p>

  <div class="regions-grid">
    <button class="region-btn" data-region="west-africa">
      <span class="region-emoji">🌍</span>
      <span class="region-name">West Africa</span>
      <span class="region-sub">Rhythm & percussion</span>
    </button>
    <button class="region-btn" data-region="east-asia">
      <span class="region-emoji">🏯</span>
      <span class="region-name">East Asia</span>
      <span class="region-sub">Silk & bamboo</span>
    </button>
    <button class="region-btn" data-region="latin-america">
      <span class="region-emoji">🌺</span>
      <span class="region-name">Latin America</span>
      <span class="region-sub">Passion & dance</span>
    </button>
    <button class="region-btn" data-region="middle-east">
      <span class="region-emoji">🕌</span>
      <span class="region-name">Middle East</span>
      <span class="region-sub">Maqam & microtones</span>
    </button>
    <button class="region-btn" data-region="south-asia">
      <span class="region-emoji">🪷</span>
      <span class="region-name">South Asia</span>
      <span class="region-sub">Raga & taal</span>
    </button>
    <button class="region-btn" data-region="europe">
      <span class="region-emoji">🎻</span>
      <span class="region-name">Europe</span>
      <span class="region-sub">Folk & classical</span>
    </button>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="panel-header">
      <span class="panel-emoji" id="panelEmoji"></span>
      <div>
        <div class="panel-title" id="panelTitle"></div>
        <div class="panel-subtitle" id="panelSubtitle"></div>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-label">Instruments</div>
        <div class="info-card-value tags" id="panelInstruments"></div>
      </div>
      <div class="info-card">
        <div class="info-card-label">Genres / Styles</div>
        <div class="info-card-value tags" id="panelGenres"></div>
      </div>
      <div class="info-card">
        <div class="info-card-label">Key Characteristic</div>
        <div class="info-card-value" id="panelCharacteristic"></div>
      </div>
    </div>
    <div class="fun-fact" id="panelFact"></div>
  </div>
</main>

<footer>Tina Chao (tiwuchao) · SI 579 · World Music Explorer</footer>

<script>
  const data = {
    "west-africa": {
      emoji: "🌍",
      title: "West Africa",
      subtitle: "Home of the world's most influential rhythmic traditions",
      instruments: ["Djembe", "Kora", "Balafon", "Talking Drum", "Shekere"],
      genres: ["Afrobeat", "Highlife", "Mbalax", "Jùjú", "Griot music"],
      characteristic: "Polyrhythm — multiple independent rhythms played simultaneously, creating interlocking grooves that form the heartbeat of modern pop and jazz.",
      fact: "<strong>Fun fact:</strong> The talking drum (dundun) can mimic the tonal patterns of the Yoruba language so precisely that it was historically used to send messages across villages — a true musical telephone!"
    },
    "east-asia": {
      emoji: "🏯",
      title: "East Asia",
      subtitle: "China, Japan, Korea — thousands of years of musical refinement",
      instruments: ["Erhu", "Guqin", "Koto", "Shakuhachi", "Gayageum", "Pipa"],
      genres: ["Gagaku", "Guqin music", "Pansori", "Minyo", "Nanguan"],
      characteristic: "Pentatonic scales dominate — five-note scales that create a sense of openness and contemplation, deeply tied to Confucian philosophy and nature.",
      fact: "<strong>Fun fact:</strong> The guqin (Chinese zither) is the world's oldest playable instrument still in use — it's been played for over 3,000 years and has 7 strings representing the 7 planets in ancient Chinese astronomy!"
    },
    "latin-america": {
      emoji: "🌺",
      title: "Latin America",
      subtitle: "A fusion of Indigenous, African, and European musical heritages",
      instruments: ["Charango", "Cajón", "Marimba", "Cuatro", "Bandoneón", "Güiro"],
      genres: ["Salsa", "Bossa Nova", "Cumbia", "Tango", "Vallenato", "Huayno"],
      characteristic: "Clave rhythm — a 2–3 or 3–2 rhythmic pattern that acts as a compass for Afro-Cuban music, keeping every instrument oriented in time.",
      fact: "<strong>Fun fact:</strong> The Cajón (a box you sit on and hit) originated when enslaved Africans in Peru were banned from playing drums — they improvised with wooden shipping crates. It's now used worldwide in flamenco and pop music!"
    },
    "middle-east": {
      emoji: "🕌",
      title: "Middle East",
      subtitle: "Ancient scales and improvisational mastery",
      instruments: ["Oud", "Qanun", "Ney", "Darbuka", "Rebab", "Saz"],
      genres: ["Maqam", "Gnawa", "Arabesque", "Tarab", "Mugham"],
      characteristic: "Maqam system — a set of scales using microtones (notes between standard semitones) that give Middle Eastern music its uniquely expressive, emotionally rich quality.",
      fact: "<strong>Fun fact:</strong> The Oud — ancestor of the European lute — has no frets, giving players total freedom to bend notes. Its name literally means 'the wood' in Arabic, and it's been played for over 5,000 years!"
    },
    "south-asia": {
      emoji: "🪷",
      title: "South Asia",
      subtitle: "India, Pakistan, Bangladesh — a universe of rhythm and melody",
      instruments: ["Sitar", "Tabla", "Sarod", "Bansuri", "Veena", "Harmonium"],
      genres: ["Hindustani classical", "Carnatic", "Qawwali", "Baul", "Bhangra"],
      characteristic: "Raga & Taal — ragas are melodic frameworks tied to specific times of day and seasons, while taals are rhythmic cycles (e.g. 16-beat Teentaal) creating hypnotic, evolving improvisations.",
      fact: "<strong>Fun fact:</strong> Ravi Shankar introduced the sitar to Western audiences when George Harrison became his student in 1966. The drone strings on a sitar are never plucked — they resonate sympathetically, creating that shimmering, layered sound!"
    },
    "europe": {
      emoji: "🎻",
      title: "Europe",
      subtitle: "From Celtic reels to Balkan brass — extraordinary diversity",
      instruments: ["Violin/Fiddle", "Hurdy-gurdy", "Bagpipes", "Accordion", "Lute", "Cimbalom"],
      genres: ["Flamenco", "Irish trad", "Klezmer", "Polka", "Fado", "Balkan brass"],
      characteristic: "Modal harmony in folk music predates modern major/minor scales — Dorian, Phrygian, and Mixolydian modes give Irish, Flamenco, and Eastern European music their distinctive flavors.",
      fact: "<strong>Fun fact:</strong> Fado, Portugal's soulful national music, means 'fate' in Portuguese. Performers traditionally wear black and the audience stays completely silent — talking during a performance is considered deeply disrespectful!"
    }
  };

  const buttons = document.querySelectorAll('.region-btn');
  const panel = document.querySelector('#infoPanel');

  const renderTags = (container, items) => {
    container.innerHTML = items.map(i => `<span class="tag">${i}</span>`).join('');
  };

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const region = btn.dataset.region;
      const d = data[region];

      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.querySelector('#panelEmoji').textContent = d.emoji;
      document.querySelector('#panelTitle').textContent = d.title;
      document.querySelector('#panelSubtitle').textContent = d.subtitle;
      renderTags(document.querySelector('#panelInstruments'), d.instruments);
      renderTags(document.querySelector('#panelGenres'), d.genres);
      document.querySelector('#panelCharacteristic').textContent = d.characteristic;
      document.querySelector('#panelFact').innerHTML = d.fact;

      panel.classList.remove('visible');
      void panel.offsetWidth;
      panel.classList.add('visible');
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });
</script>
</body>
</html>
